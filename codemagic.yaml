# Webhook on github.com/palmerbd/bubbs-app-capacitor reconnected 2026-05-05.
# Pushes to main now auto-trigger this workflow.
workflows:
  ios-release:
    name: iOS Production Build (Bubbs-Talks)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: bubbs-asc-key
    environment:
      vars:
        BUNDLE_ID: "com.abilenewebsitedesign.bubbs"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6763696733
      node: 20.11.1
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform via Capacitor
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Stage GoogleService-Info.plist (if present in ios-config)
        script: |
          SRC="$CM_BUILD_DIR/ios-config/GoogleService-Info.plist"
          DEST="$CM_BUILD_DIR/ios/App/App/GoogleService-Info.plist"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DEST"
            echo "Staged GoogleService-Info.plist into ios/App/App/"
          else
            echo "No ios-config/GoogleService-Info.plist found — Firebase native init will be skipped"
          fi
      # NOTE: We previously had a "Patch Info.plist" step between Add iOS
      # and Set up code signing. It set ITSAppUsesNonExemptEncryption=false
      # to skip the export-compliance prompt at TestFlight upload time.
      # That step coincided with builds #7-9 failing at archive time with
      # "requires a provisioning profile" — likely because PlistBuddy
      # invalidated something the auto-signing flow expected.
      #
      # Build #6 (1.0/106 on TestFlight, the only successful build in the
      # last 2 weeks) did NOT have this patch step. To restore green
      # builds we drop it. Export compliance is still answered in App
      # Store Connect's encryption questionnaire, which is the
      # authoritative place for the answer.
      - name: Set up code signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cm_priv.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cm_priv.pem
          keychain add-certificates
          cd $CM_BUILD_DIR/ios/App
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 200))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
