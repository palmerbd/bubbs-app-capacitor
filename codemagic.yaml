workflows:
  ios-release:
    name: iOS Production Build (Bubbs-Talks)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: bubbs-asc-key
    environment:
      vars:
        BUNDLE_ID: "com.abilenewebsitedesign.bubbs"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6763696733
      node: 20.11.1
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform via Capacitor
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cm_priv.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cm_priv.pem
          keychain add-certificates
          cd $CM_BUILD_DIR/ios/App
          xcode-project use-profiles
      - name: Patch Info.plist for TestFlight
        script: |
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 0.1.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Bubbs-Talks" "$PLIST" || /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Bubbs-Talks" "$PLIST"
          echo "===== Patched Info.plist ====="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 200))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
